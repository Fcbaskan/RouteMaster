<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RouteMaster - Favorilerim</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f9; padding: 20px; }
        .header { display: flex; justify-content: space-between; align-items: center; background: #fff; padding: 15px 20px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .card-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
        .card { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); border-top: 4px solid #ffc107; }
        .card h3 { margin-top: 0; color: #333; }
        .remove-btn { background-color: #dc3545; color: white; border: none; padding: 8px 12px; border-radius: 4px; cursor: pointer; margin-top: 10px; width: 100%; font-weight: bold; }
        .remove-btn:hover { background-color: #c82333; }
    </style>
</head>
<body>

    <div class="header">
        <h2>⭐ Favori Rotalarım</h2>
        <button onclick="window.location.href='dashboard.html'" style="background-color: #007bff; color: white; border: none; padding: 10px 15px; border-radius: 4px; cursor: pointer;">Ana Sayfaya Dön 🌍</button>
    </div>

    <div class="card-container" id="favoritesContainer">
        <p>Favori yazılarınız yükleniyor...</p>
    </div>

    <script src="app.js"></script>
</body>
</html>
