<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RouteMaster - Keşfet</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;800&display=swap" rel="stylesheet">
    
    <style>
        /* Genel Ayarlar & Temiz Tipografi */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background-color: #f0f4f8; color: #2d3436; scroll-behavior: smooth; }

        /* --- 1. SABİT MODERN NAVBAR --- */
        .navbar {
            display: flex; justify-content: space-between; align-items: center;
            background: white; padding: 15px 5%;
            box-shadow: 0 4px 15px rgba(0,0,0,0.03);
            position: sticky; top: 0; z-index: 100;
        }

        .navbar .logo {
            font-size: 26px; font-weight: 800; color: #3a7bd5;
            text-decoration: none; letter-spacing: -1px; display: flex; align-items: center; gap: 8px;
        }

        .nav-links { display: flex; gap: 10px; align-items: center; }

        .nav-btn {
            padding: 10px 18px; border: none; border-radius: 12px; font-weight: 500; font-size: 14px;
            cursor: pointer; transition: all 0.3s ease; text-decoration: none; display: flex; align-items: center; gap: 6px;
        }
        
        .btn-add { background-color: #e6fffa; color: #008772; }
        .btn-add:hover { background-color: #008772; color: white; }
        
        .btn-fav { background-color: #fff9db; color: #9c3600; }
        .btn-fav:hover { background-color: #ffe066; }

        .btn-logout { background-color: #fff5f5; color: #d32f2f; margin-left: 10px;}
        .btn-logout:hover { background-color: #ffe3e3; }
        
        /* Profil İkonu Tarzı */
        .btn-profile { background-color: #f3f0ff; color: #6f42c1; border-radius: 50%; width: 42px; height: 42px; padding: 0; justify-content: center; }
        .btn-profile:hover { background-color: #d1bdfc; }

        /* --- 2. GÖSTERİŞLİ HERO ARAMA BÖLÜMÜ --- */
        .hero-section {
            background: linear-gradient(135deg, #00d2ff 0%, #3a7bd5 100%);
            padding: 80px 20px; text-align: center; color: white;
            position: relative; overflow: hidden;
        }

        .hero-section::after {
            content: ''; position: absolute; bottom: -1px; left: 0; width: 100%; height: 50px;
            background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 320"><path fill="%23f0f4f8" fill-opacity="1" d="M0,224L60,213.3C120,203,240,181,360,186.7C480,192,600,224,720,224C840,224,960,192,1080,170.7C1200,149,1320,139,1380,133.3L1440,128L1440,320L1380,320C1320,320,1200,320,1080,320C960,320,840,320,720,320C600,320,480,320,360,320C240,320,120,320,60,320L0,320Z"></path></svg>') no-repeat bottom/cover;
        }

        .hero-section h1 { font-size: 42px; margin-bottom: 15px; font-weight: 800; letter-spacing: -1px; }
        .hero-section p { font-size: 18px; margin-bottom: 40px; opacity: 0.9; font-weight: 300; }

        .search-box {
            display: flex; max-width: 650px; margin: 0 auto;
            background: white; border-radius: 50px; padding: 8px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.15);
            position: relative; z-index: 2;
        }

        .search-box input {
            flex: 1; border: none; outline: none; font-size: 16px;
            padding: 12px 25px; border-radius: 50px; color: #333;
        }

        .search-box button {
            background: #3a7bd5; color: white; border: none; padding: 12px 35px;
            border-radius: 50px; cursor: pointer; font-weight: 600; font-size: 16px; transition: 0.3s;
        }

        .search-box button:hover { background: #00d2ff; transform: scale(1.03); }

        /* --- 3. PREMIUM KART DİZİLİMİ VE TASARIMI --- */
        .main-content { padding: 30px 5%; max-width: 1600px; margin: 0 auto; }
        
        .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .section-title { font-size: 28px; font-weight: 800; letter-spacing: -1px; color: #1a1a1a; }
        
        .card-container {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 30px;
        }

        /* --- YENİ KART TASARIMI --- */
        .card {
            background: white; border-radius: 20px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.03); 
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex; flex-direction: column; overflow: hidden; /* Fotoğraf taşmasın diye */
            position: relative; border: 1px solid rgba(0,0,0,0.03);
        }

        .card:hover { transform: translateY(-10px); box-shadow: 0 20px 40px rgba(0,0,0,0.1); }

        /* Sihirli Fotoğraf Alanı */
        .card-image-wrapper {
            width: 100%; height: 200px; overflow: hidden; position: relative;
        }
        
        .card-image-wrapper img {
            width: 100%; height: 100%; object-fit: cover; transition: 0.5s;
        }
        
        .card:hover .card-image-wrapper img { transform: scale(1.1); } /* Fare gelince foto büyüsün */

        /* Foto üzerindeki Şehir Etiketi */
        .card .city-tag {
            position: absolute; top: 15px; left: 15px;
            background: rgba(255,255,255,0.9); color: #333;
            padding: 6px 15px; border-radius: 20px; font-size: 12px; font-weight: 600; 
            backdrop-filter: blur(5px); box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        /* Kart İçeriği */
        .card-body { padding: 20px; flex-grow: 1; display: flex; flex-direction: column; }

        .card h3 { font-size: 21px; margin-bottom: 8px; color: #1a1a1a; font-weight: 700; line-height: 1.3; }
        
        .card .author-line { font-size: 13px; color: #777; margin-bottom: 15px; display: flex; align-items: center; gap: 5px; }

        .card p { color: #555; font-size: 14px; line-height: 1.7; margin-bottom: 15px; flex-grow: 1; }

        .card small { color: #888; font-size: 13px; display: block; margin-bottom: 10px; opacity: 0.8; }

        /* Puanlama ve Fav Butonu Alanı */
        .card-footer {
            margin-top: auto; padding: 15px 20px 20px; border-top: 1px solid #f0f0f0;
            display: flex; justify-content: space-between; align-items: center;
        }

        .star-rating { display: flex; gap: 3px; }

        .action-btn {
            padding: 10px 20px; background: #fff1f0; color: #d32f2f;
            border: none; border-radius: 12px; font-weight: 600; font-size: 14px;
            cursor: pointer; transition: all 0.3s ease;
        }
        .action-btn:hover { background: #ffccc7; transform: translateY(-2px); }

    </style>
</head>
<body>

    <nav class="navbar">
        <a href="dashboard.html" class="logo"><span>🌍</span> RouteMaster</a>
        <div class="nav-links">
            <button onclick="window.location.href='ekle.html'" class="nav-btn btn-add">➕ Yeni Rota</button>
            <button onclick="window.location.href='favoriler.html'" class="nav-btn btn-fav">⭐ Favorilerim</button>
            <button onclick="window.location.href='benimyazilarim.html'" class="nav-btn btn-my">📝 Yazılarım</button>
            <button onclick="window.location.href='profil.html'" class="nav-btn btn-profile" title="Profilim">👤</button>
            <button onclick="logout()" class="nav-btn btn-logout" title="Çıkış Yap">🚪</button>
        </div>
    </nav>

    <div class="hero-section">
        <h1>Dünyayı Keşfetmeye Başla</h1>
        <p>Gezginlerin rotalarını incele, kendi maceranı planla.</p>
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Şehir veya Ülke ara... (Örn: İstanbul)">
            <button onclick="sehireGoreAra()">Keşfet 🔍</button>
        </div>
    </div>

    <div class="main-content">
        <div class="section-header">
            <h2 class="section-title">En Popüler Rotalar</h2>
        </div>
        
        <div id="traveloguesContainer" class="card-container">
            <p style="text-align:center; width: 100%; color: #777;">Rotalar yükleniyor... 🌍</p>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
