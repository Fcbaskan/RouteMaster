<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RouteMaster - Giriş Yap</title>
    <style>
        /* Test için çok basit bir tasarım */
        body { font-family: Arial, sans-serif; background-color: #f4f4f9; padding: 20px; }
        .container { max-width: 400px; margin: 0 auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); margin-bottom: 20px; }
        input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background-color: #28a745; color: white; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background-color: #218838; }
        h2 { text-align: center; }
    </style>
</head>
<body>

    <div class="container">
        <h2>Giriş Yap</h2>
        <form id="loginForm">
            <input type="email" id="loginEmail" placeholder="E-posta" required>
            <input type="password" id="loginPassword" placeholder="Şifre" required>
            <button type="submit">Giriş Yap</button>
        </form>
    </div>

    <div class="container">
        <h2>Yeni Kayıt Oluştur</h2>
        <form id="registerForm">
            <input type="text" id="regFirstName" placeholder="Ad" required>
            <input type="text" id="regLastName" placeholder="Soyad" required>
            <input type="text" id="regUsername" placeholder="Kullanıcı Adı" required>
            <input type="email" id="regEmail" placeholder="E-posta" required>
            <input type="password" id="regPassword" placeholder="Şifre" required>
            <button type="submit" style="background-color: #007bff;">Kayıt Ol</button>
        </form>
    </div>

    <script src="app.js"></script>
</body>
</html>
