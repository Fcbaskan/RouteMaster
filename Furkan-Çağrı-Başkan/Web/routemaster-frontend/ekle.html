<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RouteMaster - Yeni Rota Ekle</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;800&display=swap" rel="stylesheet">
    
    <style>
        /* Genel Ayarlar & Temiz Tipografi */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { color: #fdfdfd; min-height: 100vh; position: relative; overflow-x: hidden; }

        /* --- ARKA PLAN (Ana sayfa ile uyumlu) --- */
        body {
            background: url('https://images.unsplash.com/photo-1506929562872-bb421503ef21?q=80&w=2000&auto=format&fit=crop') no-repeat center center/cover fixed;
            display: flex; flex-direction: column;
        }

        /* Arka plan karartması */
        body::before {
            content: ''; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.5); z-index: 1;
        }

        /* Cam Panel (Glassmorphism) */
        .glass-panel {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.25);
            border-radius: 20px; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            position: relative; z-index: 2;
        }

        /* --- NAVBAR --- */
        .navbar {
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px 5%; position: fixed; top: 0; left: 0; width: 100%; z-index: 100;
            background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .navbar .logo {
            font-size: 26px; font-weight: 800; color: #fff;
            text-decoration: none; display: flex; align-items: center; gap: 8px;
        }

        .nav-btn {
            padding: 10px 18px; border: none; border-radius: 12px; font-weight: 500; font-size: 14px;
            cursor: pointer; transition: all 0.3s ease; text-decoration: none; color: white; background: rgba(0,0,0,0.3);
        }
        .nav-btn:hover { background: rgba(0,0,0,0.6); }

        /* --- FORM KONTEYNERİ --- */
        .form-container {
            max-width: 850px; margin: 120px auto 60px; padding: 40px; width: 90%;
        }

        .form-header { text-align: center; margin-bottom: 35px; }
        .form-header h1 { font-size: 38px; font-weight: 800; color: #ffe066; margin-bottom: 10px; text-shadow: 0 2px 4px rgba(0,0,0,0.3); }
        .form-header p { font-size: 17px; color: rgba(255,255,255,0.9); }

        /* --- FORM ELEMANLARI --- */
        .form-group { margin-bottom: 22px; }
        .form-group label {
            display: block; font-size: 15px; font-weight: 500; margin-bottom: 8px; color: rgba(255,255,255,0.95);
        }

        .form-control {
            width: 100%; padding: 16px; background: rgba(0, 0, 0, 0.25);
            border: 1px solid rgba(255, 255, 255, 0.2); border-radius: 12px;
            color: white; font-size: 15px; outline: none; transition: 0.3s;
        }

        .form-control::placeholder { color: rgba(255, 255, 255, 0.5); }
        .form-control:focus {
            background: rgba(0, 0, 0, 0.4); border-color: #ffe066;
            box-shadow: 0 0 12px rgba(255, 224, 102, 0.3);
        }

        textarea.form-control { resize: vertical; min-height: 180px; line-height: 1.6; }

        .row { display: flex; gap: 20px; }
        .row .form-group { flex: 1; }

        /* Mobilde yan yana olanları alt alta al */
        @media (max-width: 650px) { .row { flex-direction: column; gap: 0; } }

        /* --- GÖNDER BUTONU --- */
        .submit-btn {
            width: 100%; padding: 18px; background: linear-gradient(135deg, #008772 0%, #00b398 100%);
            color: white; border: none; border-radius: 12px; font-weight: 600; font-size: 18px;
            cursor: pointer; transition: all 0.3s ease; margin-top: 15px;
            box-shadow: 0 6px 20px rgba(0, 135, 114, 0.3); text-transform: uppercase; letter-spacing: 1px;
        }
        .submit-btn:hover { transform: translateY(-3px); box-shadow: 0 10px 25px rgba(0, 135, 114, 0.5); }

    </style>
</head>
<body>

    <nav class="navbar">
        <a href="dashboard.html" class="logo"><span>🌍</span> RouteMaster</a>
        <button onclick="window.history.back()" class="nav-btn">🔙 İptal ve Geri Dön</button>
    </nav>

    <div class="form-container glass-panel">
        <div class="form-header">
            <h1>Yeni Bir Rota Ekle ✍️</h1>
            <p>Deneyimlerini paylaş, diğer gezginlere ilham ol.</p>
        </div>

        <form id="addTravelogueForm">
            <div class="form-group">
                <label>Yazı Başlığı</label>
                <input type="text" id="tTitle" class="form-control" placeholder="Örn: Büyüleyici Antalya Kaleiçi Turu" required>
            </div>

            <div class="row">
                <div class="form-group">
                    <label>Şehir</label>
                    <input type="text" id="tCity" class="form-control" placeholder="Örn: Antalya" required>
                </div>
                <div class="form-group">
                    <label>Ülke</label>
                    <input type="text" id="tCountry" class="form-control" placeholder="Örn: Türkiye" required>
                </div>
                <div class="form-group">
                    <label>Yazar (Adınız)</label>
                    <input type="text" id="tAuthorName" class="form-control" placeholder="Adınız veya Takma Adınız" required>
                </div>
            </div>

            <div class="form-group">
                <label>Gezilecek Yerler (Virgülle ayırın)</label>
                <input type="text" id="tPlaces" class="form-control" placeholder="Örn: Düden Şelalesi, Konyaaltı Plajı, Olympos" required>
            </div>

            <div class="form-group">
                <label>Gezi Notlarınız ve Deneyimleriniz</label>
                <textarea id="tContent" class="form-control" placeholder="Buraya muhteşem anılarını yazmaya başla..." required></textarea>
            </div>

            <button type="submit" class="submit-btn">🚀 Rotayı Yayınla</button>
        </form>
    </div>

    <script src="app.js"></script>
</body>
</html>
