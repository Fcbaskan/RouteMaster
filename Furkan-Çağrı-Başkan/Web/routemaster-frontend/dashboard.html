<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RouteMaster - Ana Sayfa</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <style>
        /* Genel Ayarlar */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background-color: #f4f7f6; color: #333; }

        /* --- 1. MODERN ÜST MENÜ (NAVBAR) --- */
        .navbar {
            display: flex; justify-content: space-between; align-items: center;
            background: white; padding: 15px 5%;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            position: sticky; top: 0; z-index: 100;
        }

        .navbar .logo {
            font-size: 24px; font-weight: 800; color: #3a7bd5;
            text-decoration: none; letter-spacing: 1px;
        }

        .nav-links { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }

        .nav-btn {
            padding: 10px 15px; border: none; border-radius: 8px; font-weight: 600; font-size: 14px;
            cursor: pointer; transition: 0.3s; text-decoration: none; display: inline-block;
        }
        
        /* Buton Renkleri */
        .btn-add { background-color: #28a745; color: white; }
        .btn-my { background-color: #17a2b8; color: white; }
        .btn-fav { background-color: #ffc107; color: black; }
        .btn-profile { background-color: #6f42c1; color: white; }
        .btn-logout { background-color: #dc3545; color: white; }

        .nav-btn:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0,0,0,0.15); filter: brightness(1.1); }

        /* --- 2. GÖSTERİŞLİ ARAMA BÖLÜMÜ (HERO) --- */
        .hero-section {
            background: linear-gradient(135deg, #00d2ff 0%, #3a7bd5 100%);
            padding: 60px 20px; text-align: center; color: white;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .hero-section h1 { font-size: 36px; margin-bottom: 10px; font-weight: 800; }
        .hero-section p { font-size: 16px; margin-bottom: 30px; opacity: 0.9; }

        .search-box {
            display: flex; max-width: 600px; margin: 0 auto;
            background: white; border-radius: 50px; padding: 6px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        .search-box input {
            flex: 1; border: none; outline: none; font-size: 16px;
            padding: 10px 20px; border-radius: 50px 0 0 50px; background: transparent;
        }

        .search-box button {
            background: #3a7bd5; color: white; border: none; padding: 12px 30px;
            border-radius: 50px; cursor: pointer; font-weight: 600; font-size: 16px; transition: 0.3s;
        }

        .search-box button:hover { background: #00d2ff; }

        /* --- 3. KARTLARIN DİZİLİMİ VE TASARIMI --- */
        .main-content { padding: 40px 5%; max-width: 1400px; margin: 0 auto; }
        
        .section-title { font-size: 24px; margin-bottom: 20px; color: #333; border-left: 5px solid #3a7bd5; padding-left: 10px; }

        .card-container {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 25px;
        }

        /* app.js'nin ürettiği HTML'i CSS ile süslüyoruz! */
        .card {
            background: white; border-radius: 15px; padding: 25px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05); transition: 0.3s;
            display: flex; flex-direction: column; position: relative;
            border-top: 5px solid #00d2ff;
        }

        .card:hover { transform: translateY(-8px); box-shadow: 0 15px 30px rgba(0,0,0,0.12); }

        .card h3 { font-size: 20px; margin-bottom: 10px; color: #222; }
        
        .card .city-tag {
            display: inline-block; background: #e0f7fa; color: #0097a7;
            padding: 5px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; margin-bottom: 15px; align-self: flex-start;
        }

        .card p { color: #555; font-size: 14px; line-height: 1.6; margin-bottom: 15px; flex-grow: 1; }

        .card small { color: #777; font-size: 13px; display: block; margin-bottom: 5px; }

        .action-btn {
            width: 100%; padding: 12px; background: #ffebee; color: #d32f2f;
            border: none; border-radius: 8px; font-weight: 600; cursor: pointer; transition: 0.3s; margin-top: 15px;
        }
        .action-btn:hover { background: #ffcdd2; transform: scale(1.02); }

    </style>
</head>
<body>

    <nav class="navbar">
        <a href="dashboard.html" class="logo">🌍 RouteMaster</a>
        <div class="nav-links">
            <button onclick="window.location.href='ekle.html'" class="nav-btn btn-add">Yeni Rota Ekle ✍️</button>
            <button onclick="window.location.href='favoriler.html'" class="nav-btn btn-fav">Favorilerim ⭐</button>
            <button onclick="window.location.href='benimyazilarim.html'" class="nav-btn btn-my">Benim Yazılarım 📝</button>
            <button onclick="window.location.href='profil.html'" class="nav-btn btn-profile">Profilim 👤</button>
            <button onclick="logout()" class="nav-btn btn-logout">Çıkış Yap</button>
        </div>
    </nav>

    <div class="hero-section">
        <h1>Sıradaki Maceranı Bul</h1>
        <p>Diğer gezginlerin deneyimlerini oku, rotanı çiz ve yola çık.</p>
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Hangi şehri merak ediyorsun? (Örn: Antalya, Roma)">
            <button onclick="sehireGoreAra()">Keşfet 🔍</button>
        </div>
    </div>

    <div class="main-content">
        <h2 class="section-title">En Yeni Rotalar</h2>
        
        <div id="traveloguesContainer" class="card-container">
            <p style="text-align:center; width: 100%;">Rotalar yükleniyor... 🌍</p>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
