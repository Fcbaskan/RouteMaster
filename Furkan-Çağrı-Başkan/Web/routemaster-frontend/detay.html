<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RouteMaster - Gezi Detayı</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;800&display=swap" rel="stylesheet">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { color: #fdfdfd; scroll-behavior: smooth; position: relative; overflow-x: hidden; }

        body {
            min-height: 100vh;
            background: url('https://images.unsplash.com/photo-1506929562872-bb421503ef21?q=80&w=2000&auto=format&fit=crop') no-repeat center center/cover fixed;
            display: flex; flex-direction: column;
        }

        body::before {
            content: ''; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.45); z-index: 1;
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.25);
            border-radius: 20px; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            position: relative; z-index: 2;
        }

        .navbar {
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px 5%; position: fixed; top: 0; left: 0; width: 100%; z-index: 100;
        }
        .navbar .logo { font-size: 26px; font-weight: 800; color: #fff; text-decoration: none; display: flex; align-items: center; gap: 8px; }
        .nav-btn { padding: 10px 18px; border: none; border-radius: 12px; font-weight: 500; font-size: 14px; cursor: pointer; transition: all 0.3s ease; text-decoration: none; color: white; background: rgba(0,0,0,0.3); }
        .nav-btn:hover { background: rgba(0,0,0,0.6); }

        .detail-container {
            max-width: 900px; margin: 100px auto 40px; padding: 40px;
            display: flex; flex-direction: column; gap: 20px;
        }

        .detail-header { text-align: center; margin-bottom: 20px; }
        .detail-header h1 { font-size: 40px; font-weight: 800; margin-bottom: 10px; color: #ffffff; text-shadow: 0 2px 5px rgba(0,0,0,0.3); }
        .detail-header .meta { font-size: 16px; color: rgba(255,255,255,0.9); display: flex; justify-content: center; gap: 20px; }

        .detail-image { width: 100%; height: 400px; border-radius: 15px; overflow: hidden; box-shadow: 0 10px 20px rgba(0,0,0,0.3); margin-bottom: 20px; }
        .detail-image img { width: 100%; height: 100%; object-fit: cover; }

        .detail-content { font-size: 18px; line-height: 1.8; color: rgba(255,255,255,0.95); text-align: justify; margin-bottom: 30px; }
        
        .places-list { background: rgba(0,0,0,0.2); padding: 20px; border-radius: 10px; margin-bottom: 30px; }
        .places-list h3 { color: #ffffff; margin-bottom: 10px; }
        .interaction-bar {
            display: flex; justify-content: space-between; align-items: center;
            background: rgba(255,255,255,0.1); padding: 20px; border-radius: 15px;
            border-top: 1px solid rgba(255,255,255,0.2);
        }

        .star-rating { display: flex; align-items: center; gap: 10px; }
        .star-rating span { font-size: 28px; cursor: pointer; transition: 0.2s; }
        .star-rating span:hover { transform: scale(1.2); }

        .delete-rating-btn { background: #dc3545; color: white; border: none; padding: 6px 12px; border-radius: 8px; cursor: pointer; font-size: 12px; margin-left: 15px; }
        .delete-rating-btn:hover { background: #c82333; }

        .action-btn { padding: 12px 25px; background: #ffe066; color: #9c3600; border: none; border-radius: 12px; font-weight: 600; font-size: 16px; cursor: pointer; transition: all 0.3s ease; }
        .action-btn:hover { background: #fff9db; transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
    </style>
</head>
<body>

    <nav class="navbar glass-panel">
        <a href="dashboard.html" class="logo"><span></span> RouteMaster</a>
        <button onclick="window.history.back()" class="nav-btn">🏠Ana Sayfa</button>
    </nav>

    <div id="geziDetayContainer" class="detail-container glass-panel">
        <h2 style="text-align: center;">Yükleniyor... ⏳</h2>
    </div>

    <script src="app.js"></script>
</body>
</html>
