<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RouteMaster - Dünyayı Keşfet</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <style>
        /* Genel Ayarlar */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        /* Arka Plan Manzarası */
        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: url('https://images.unsplash.com/photo-1506929562872-bb421503ef21?q=80&w=2000&auto=format&fit=crop') no-repeat center center/cover;
            position: relative;
            overflow: hidden;
        }

        body::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1;
        }

        /* --- YENİ: ÜST ŞEFFAF ÇUBUK (NAVBAR) --- */
        .top-nav {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 70px;
            display: flex;
            justify-content: center;
            align-items: center;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 10;
            transition: 0.5s ease;
        }

        .top-nav h1 {
            color: white;
            font-size: 22px;
            font-weight: 800;
            letter-spacing: 3px;
            text-transform: uppercase;
            cursor: pointer;
            transition: 0.3s;
        }

        .top-nav h1:hover {
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.6);
            transform: scale(1.05);
        }

        /* Ana Konteyner */
        .container {
            position: relative;
            z-index: 2;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
        }

        /* Cam Efektli Kartlar */
        .glass-card {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 20px;
            padding: 40px;
            width: 420px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            color: white;
            transition: all 0.5s ease-in-out;
        }

        .glass-card h2 { text-align: center; margin-bottom: 25px; font-size: 26px; font-weight: 600; }
        .glass-card h1 { text-align: center; margin-bottom: 10px; font-size: 42px; font-weight: 800; }
        .glass-card p { text-align: center; margin-bottom: 30px; font-size: 16px; color: #eee; line-height: 1.6; }

        /* Form Elemanları */
        .form-group { margin-bottom: 18px; }
        .glass-card input {
            width: 100%; padding: 12px 15px; border: none; border-radius: 8px;
            background: rgba(255, 255, 255, 0.2); color: white; font-size: 14px; outline: none; transition: 0.3s;
        }
        .glass-card input::placeholder { color: rgba(255, 255, 255, 0.6); }
        .glass-card input:focus { background: rgba(255, 255, 255, 0.3); }

        .row { display: flex; gap: 10px; }
        .row .form-group { flex: 1; }

        /* Butonlar */
        .btn {
            width: 100%; padding: 14px; border: none; border-radius: 8px; font-size: 16px; font-weight: 600;
            cursor: pointer; transition: 0.3s; margin-top: 10px; color: white;
        }
        .btn-primary { background: linear-gradient(135deg, #00d2ff 0%, #3a7bd5 100%); }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0, 210, 255, 0.4); }
        
        .btn-secondary { background: linear-gradient(135deg, #f2994a 0%, #f2c94c 100%); color: black; }
        .btn-secondary:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(242, 153, 74, 0.4); }

        /* Yardımcı Sınıf */
        .hidden { display: none !important; opacity: 0; }
    </style>
</head>
<body>

    <div id="topNavbar" class="top-nav hidden">
        <h1 onclick="ekranDegistir('welcomeScreen')">RouteMaster</h1>
    </div>

    <div class="container">
        
        <div id="welcomeScreen" class="glass-card">
            <h1 style="text-align: center; margin-bottom: 10px;">RouteMaster</h1>
            <p>Dünyayı keşfetmeye, rotanı çizmeye ve deneyimlerini paylaşmaya hazır mısın?</p>
            <button onclick="ekranDegistir('loginCard')" class="btn btn-primary">Giriş Yap</button>
            <button onclick="ekranDegistir('registerCard')" class="btn btn-secondary">Kayıt Ol</button>
        </div>

        <div id="loginCard" class="glass-card hidden">
            <h2>Giriş Yap 🌍</h2>
            <form id="loginForm">
                <div class="form-group">
                    <input type="email" id="loginEmail" placeholder="E-posta Adresiniz" required>
                </div>
                <div class="form-group">
                    <input type="password" id="loginPassword" placeholder="Şifreniz" required>
                </div>
                <button type="submit" class="btn btn-primary">Giriş Yap 🚀</button>
            </form>
        </div>

        <div id="registerCard" class="glass-card hidden">
            <h2>Kayıt Ol ✍️</h2>
            <form id="registerForm">
                <div class="row">
                    <div class="form-group">
                        <input type="text" id="regFirstName" placeholder="Adınız" required>
                    </div>
                    <div class="form-group">
                        <input type="text" id="regLastName" placeholder="Soyadınız" required>
                    </div>
                </div>
                <div class="form-group">
                    <input type="text" id="regUsername" placeholder="Kullanıcı Adı" required>
                </div>
                <div class="form-group">
                    <input type="email" id="regEmail" placeholder="E-posta" required>
                </div>
                <div class="form-group">
                    <input type="password" id="regPassword" placeholder="Şifre" required>
                </div>
                <button type="submit" class="btn btn-secondary">Aramıza Katıl 🌟</button>
            </form>
        </div>

    </div>

    <script>
        function ekranDegistir(hedefEkranId) {
            const navbar = document.getElementById('topNavbar');
            
            // Tüm kartları gizle
            document.getElementById('welcomeScreen').classList.add('hidden');
            document.getElementById('loginCard').classList.add('hidden');
            document.getElementById('registerCard').classList.add('hidden');
            
            // Seçilen kartı göster
            document.getElementById(hedefEkranId).classList.remove('hidden');

            // Navbar Kontrolü: Sadece hoşgeldin ekranı DEĞİLSE göster
            if (hedefEkranId === 'welcomeScreen') {
                navbar.classList.add('hidden');
            } else {
                navbar.classList.remove('hidden');
            }
        }
    </script>

    <script src="app.js"></script>
</body>
</html>
