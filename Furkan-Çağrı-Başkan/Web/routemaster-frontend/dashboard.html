<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RouteMaster - Keşfet</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;800&display=swap" rel="stylesheet">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { color: #fdfdfd; scroll-behavior: smooth; position: relative; overflow-x: hidden; }

        body {
            min-height: 100vh;
            background: url('https://images.unsplash.com/photo-1506929562872-bb421503ef21?q=80&w=2000&auto=format&fit=crop') no-repeat center center/cover fixed;
            display: flex; flex-direction: column;
        }

        body::before {
            content: ''; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.45); z-index: 1;
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.25);
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            position: relative; z-index: 2;
        }

        .navbar {
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px 5%;
            position: fixed; top: 0; left: 0; width: 100%;
            z-index: 100; transition: background 0.3s;
        }

        .navbar .logo {
            font-size: 26px; font-weight: 800; color: #fff;
            text-decoration: none; letter-spacing: -1px; display: flex; align-items: center; gap: 8px;
        }

        .nav-links { display: flex; gap: 10px; align-items: center; }

        .nav-btn {
            padding: 10px 18px; border: none; border-radius: 12px; font-weight: 500; font-size: 14px;
            cursor: pointer; transition: all 0.3s ease; text-decoration: none; display: flex; align-items: center; gap: 6px;
        }
        
        .btn-add { background-color: #008772; color: #fff; }
        .btn-add:hover { background-color: #e6fffa; color: #008772; }
        
        .btn-fav { background-color: #ffe066; color: #9c3600; }
        .btn-fav:hover { background-color: #fff9db; color: #9c3600; }

        .btn-logout { background-color: #ffe3e3; color: #d32f2f; margin-left: 10px;}
        .btn-logout:hover { background-color: #fff5f5; color: #d32f2f; }
        
        .btn-profile { background-color: #d1bdfc; color: #6f42c1; border-radius: 50%; width: 42px; height: 42px; padding: 0; justify-content: center; }
        .btn-profile:hover { background-color: #f3f0ff; color: #6f42c1; }

        .hero-section {
            padding: 120px 20px 60px; text-align: center; color: rgb(255, 255, 255);
            position: relative; z-index: 2;
        }

        .hero-section h1 { font-size: 48px; margin-bottom: 15px; font-weight: 800; letter-spacing: -1px; }
        .hero-section p { font-size: 19px; margin-bottom: 45px; opacity: 0.9; font-weight: 300; }

        .search-box {
            display: flex; max-width: 650px; margin: 0 auto;
            border-radius: 50px; padding: 10px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.25);
        }

        .search-box input {
            flex: 1; border: none; outline: none; font-size: 16px;
            padding: 14px 28px; border-radius: 50px; color: #fdfdfd; background: transparent;
        }
        .search-box input::placeholder { color: rgba(255, 255, 255, 0.7); }

        .search-box button {
            background: #ffffff; color: #9c3600; border: none; padding: 14px 38px;
            border-radius: 50px; cursor: pointer; font-weight: 600; font-size: 16px; transition: 0.3s;
        }

        .search-box button:hover { background: #fff9db; transform: scale(1.03); }

        .main-content { padding: 40px 5%; max-width: 1600px; margin: 0 auto; flex-grow: 1; position: relative; z-index: 2;}
        
        .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 35px; }
        .section-title { font-size: 30px; font-weight: 800; letter-spacing: -1px; color: #fff; border-left: 5px solid #ffffff; padding-left: 10px;}
        
        .card-container {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 30px;
        }

        .card {
            border-radius: 20px; 
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex; flex-direction: column; overflow: hidden;
            border-top: 5px solid #ffffff;
        }

        .card:hover { transform: translateY(-10px); box-shadow: 0 20px 45px rgba(0,0,0,0.3); border-color: #fff9db; }

        .card-image-wrapper { width: 100%; height: 210px; overflow: hidden; position: relative; }
        .card-image-wrapper img { width: 100%; height: 100%; object-fit: cover; transition: 0.6s; }
        .card:hover .card-image-wrapper img { transform: scale(1.1); }

        .card .city-tag {
            position: absolute; top: 15px; left: 15px;
            background: rgba(255,255,255,0.8); color: #222;
            padding: 6px 15px; border-radius: 20px; font-size: 12px; font-weight: 600; 
            backdrop-filter: blur(5px); box-shadow: 0 4px 10px rgba(0,0,0,0.15);
        }

        .card-body { padding: 22px; flex-grow: 1; display: flex; flex-direction: column; }
        .card h3 { font-size: 22px; margin-bottom: 10px; color: #fff; font-weight: 700; line-height: 1.3; }
        .card .author-line { font-size: 14px; color: rgba(255, 255, 255, 0.85); margin-bottom: 18px; display: flex; align-items: center; gap: 5px; }
        .card p { color: rgba(255, 255, 255, 0.8); font-size: 15px; line-height: 1.7; margin-bottom: 18px; flex-grow: 1; }
        .card small { color: rgba(255, 255, 255, 0.75); font-size: 14px; display: block; margin-bottom: 10px; opacity: 0.85; }

        .card-footer {
            margin-top: auto; padding: 18px 22px 22px; border-top: 1px solid rgba(255, 255, 255, 0.15);
            display: flex; justify-content: space-between; align-items: center;
        }
        .star-rating { display: flex; gap: 4px; }

        .action-btn {
            padding: 12px 25px; background: #ffe3e3; color: #d32f2f;
            border: none; border-radius: 12px; font-weight: 600; font-size: 15px;
            cursor: pointer; transition: all 0.3s ease;
        }
        .action-btn:hover { background: #fff5f5; transform: translateY(-2px); }

        .card:hover .action-btn { background: #ffe066; color: #9c3600; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .card:hover .action-btn:hover { background: #fff9db; color: #9c3600;}

    </style>
</head>
<body>

    <nav class="navbar glass-panel" id="mainNavbar">
        <a href="dashboard.html" class="logo"><span></span> RouteMaster</a>
        <div class="nav-links">
            <button onclick="window.location.href='ekle.html'" class="nav-btn btn-add">➕ Yeni Yazı</button>
            <button onclick="window.location.href='benimyazilarim.html'" class="nav-btn btn-my">📝 Yazılarım</button>
            <button onclick="window.location.href='favoriler.html'" class="nav-btn btn-fav">⭐ Favorilerim</button>
            <button onclick="window.location.href='profil.html'" class="nav-btn btn-profile" title="Profilim">👤</button>
            <button onclick="logout()" class="nav-btn btn-logout" title="Çıkış Yap">🚪</button>
        </div>
    </nav>

    <div class="hero-section">
        <h1>Sıradaki Maceranı Bul</h1>
        <p>Diğer gezginlerin Gezilerini incele, kendi maceranı planla.</p>
        <div class="search-box glass-panel">
            <input type="text" id="searchInput" placeholder="Şehir veya Ülke ara... (Örn: İstanbul)">
            <button onclick="sehireGoreAra()">Keşfet 🔍</button>
        </div>
    </div>

    <div class="main-content">
        <div class="section-header">
            <h2 class="section-title">Popüler Gezi Yazıları</h2>
        </div>
        
        <div id="traveloguesContainer" class="card-container">
            <p style="text-align:center; width: 100%; color: rgba(255, 255, 255, 0.7);">Gezi yazıları yükleniyor... 🌍</p>
        </div>
    </div>

    <script>
        window.onscroll = function() {
            const navbar = document.getElementById('mainNavbar');
            if (window.scrollY > 50) {
                navbar.style.background = 'rgba(255, 255, 255, 0.1)';
            } else {
                navbar.style.background = 'transparent';
            }
        };
    </script>
    <script src="app.js"></script>
</body>
</html>
