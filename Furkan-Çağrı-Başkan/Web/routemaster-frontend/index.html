<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RouteMaster - Dünyayı Keşfet</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <style>
        /* Genel Ayarlar */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        /* Arka Plan Manzarası */
        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: url('https://images.unsplash.com/photo-1506929562872-bb421503ef21?q=80&w=2000&auto=format&fit=crop') no-repeat center center/cover;
            position: relative;
            overflow: hidden;
        }

        /* Arka plan karartması */
        body::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1;
        }

        /* Ana Kutu (Tüm kartları ortalar) */
        .container {
            position: relative;
            z-index: 2;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
        }

        /* Cam Efektli Kart Yapısı (Glassmorphism) */
        .glass-card {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 20px;
            padding: 40px;
            width: 400px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            color: white;
            transition: all 0.5s ease-in-out;
        }

        /* Başlıklar */
        .glass-card h2 { text-align: center; margin-bottom: 25px; font-size: 28px; font-weight: 600; }
        .glass-card h1 { text-align: center; margin-bottom: 10px; font-size: 36px; font-weight: 800; color: #fff; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); }
        .glass-card p { text-align: center; margin-bottom: 30px; font-size: 16px; color: #ddd; }

        /* Form Kutuları */
        .form-group { margin-bottom: 20px; }
        .glass-card input {
            width: 100%; padding: 12px 15px; border: none; border-radius: 8px;
            background: rgba(255, 255, 255, 0.2); color: white; font-size: 14px; outline: none; transition: 0.3s;
        }
        .glass-card input::placeholder { color: rgba(255, 255, 255, 0.7); }
        .glass-card input:focus { background: rgba(255, 255, 255, 0.3); box-shadow: 0 0 10px rgba(255, 255, 255, 0.2); }

        /* İki sütunlu kayıt formu için */
        .row { display: flex; gap: 10px; }
        .row .form-group { flex: 1; }

        /* Butonlar */
        .btn {
            width: 100%; padding: 12px; border: none; border-radius: 8px; font-size: 16px; font-weight: 600;
            cursor: pointer; transition: 0.3s; margin-top: 10px; color: white;
        }
        .btn-primary { background: linear-gradient(135deg, #00d2ff 0%, #3a7bd5 100%); }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0, 210, 255, 0.4); }
        
        .btn-secondary { background: linear-gradient(135deg, #f2994a 0%, #f2c94c 100%); color: black; }
        .btn-secondary:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(242, 153, 74, 0.4); }

        .btn-back {
            background: none; border: none; color: rgba(255, 255, 255, 0.7); font-size: 14px;
            cursor: pointer; display: block; margin: 20px auto 0; text-decoration: underline;
        }
        .btn-back:hover { color: white; }

        /* GİZLEME SINIFI (Sihir burada gerçekleşiyor) */
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div class="container">
        
        <div id="welcomeScreen" class="glass-card">
            <h1>RouteMaster</h1>
            <p>Dünyayı keşfetmeye, rotanı çizmeye ve deneyimlerini paylaşmaya hazır mısın?</p>
            <button onclick="ekranDegistir('loginCard')" class="btn btn-primary">Giriş Yap</button>
            <button onclick="ekranDegistir('registerCard')" class="btn btn-secondary">Kayıt Ol</button>
        </div>

        <div id="loginCard" class="glass-card hidden">
            <h2>Giriş Yap 🌍</h2>
            <form id="loginForm">
                <div class="form-group">
                    <input type="email" id="loginEmail" placeholder="E-posta Adresiniz" required>
                </div>
                <div class="form-group">
                    <input type="password" id="loginPassword" placeholder="Şifreniz" required>
                </div>
                <button type="submit" class="btn btn-primary">Giriş Yap 🚀</button>
            </form>
            <button onclick="ekranDegistir('welcomeScreen')" class="btn-back">🔙 Ana Ekrana Dön</button>
        </div>

        <div id="registerCard" class="glass-card hidden">
            <h2>Kayıt Ol ✍️</h2>
            <form id="registerForm">
                <div class="row">
                    <div class="form-group">
                        <input type="text" id="regFirstName" placeholder="Adınız" required>
                    </div>
                    <div class="form-group">
                        <input type="text" id="regLastName" placeholder="Soyadınız" required>
                    </div>
                </div>
                <div class="form-group">
                    <input type="text" id="regUsername" placeholder="Kullanıcı Adı" required>
                </div>
                <div class="form-group">
                    <input type="email" id="regEmail" placeholder="E-posta" required>
                </div>
                <div class="form-group">
                    <input type="password" id="regPassword" placeholder="Şifre" required>
                </div>
                <button type="submit" class="btn btn-secondary">Aramıza Katıl 🌟</button>
            </form>
            <button onclick="ekranDegistir('welcomeScreen')" class="btn-back">🔙 Ana Ekrana Dön</button>
        </div>

    </div>

    <script>
        function ekranDegistir(hedefEkranId) {
            // Önce tüm kartları gizle
            document.getElementById('welcomeScreen').classList.add('hidden');
            document.getElementById('loginCard').classList.add('hidden');
            document.getElementById('registerCard').classList.add('hidden');
            
            // Sonra sadece istenen kartı göster
            document.getElementById(hedefEkranId).classList.remove('hidden');
        }
    </script>

    <script src="app.js"></script>
</body>
</html>
